name: Daily Timeline Auto Render

on:
  push:
    paths:
      - 'daily_data.json'
  workflow_dispatch:

jobs:
  render_svg:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Python Script
        run: python generate_timeline_svg.py # 确认这里和你的文件名一致

      - name: Push Generated SVG
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily_timeline.svg
          git commit -m "docs: 自动更新每日记录时间轴" || exit 0
          git push
